import time
import random
import uuid
import logging
import requests
from datetime import datetime, timezone

# Configuration
API_URL = "https://staging.example.com/storage"
API_KEY = "REPLACE_WITH_KEY"
MAX_RETRIES = 5
BACKOFF_BASE = 2
JITTER = 0.25

logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")

def generate_identifier(batch_date=None, seq=None):
    date = batch_date or datetime.now(timezone.utc).strftime("%Y%m%d")
    unique = uuid.uuid4().hex[:8].upper()
    seq_part = f"{seq:04d}" if seq is not None else "0001"
    return f"LOT-{date}-{unique}-{seq_part}"

def print_label(item_id, product_code, batch_number, date):
    return f"Label: {item_id}, {product_code}, {batch_number}, {date}"

def scan_label(label):
    # Replace with real scanner integration; return True/False
    return random.random() > 0.1

def build_payload(item_id, product_code, batch_number, timestamp, location, status, run_id, operator_id, label_image_url=None):
    return {
        "identifier": item_id,
        "product_code": product_code,
        "batch_number": batch_number,
        "timestamp": timestamp,
        "location": location,
        "status": status,
        "source_run_id": run_id,
        "operator_id": operator_id,
        "label_image_url": label_image_url
    }

def post_to_storage_api(payload, idempotency_key):
    headers = {"Authorization": f"Bearer {API_KEY}", "Idempotency-Key": idempotency_key}
    try:
        resp = requests.post(API_URL, json=payload, headers=headers, timeout=10)
        return {"success": resp.ok, "status_code": resp.status_code, "body": resp.json() if resp.content else None}
    except requests.RequestException as e:
        return {"success": False, "error": str(e)}

def retry_post(payload, idempotency_key):
    for attempt in range(1, MAX_RETRIES + 1):
        result = post_to_storage_api(payload, idempotency_key)
        if result.get("success"):
            return result
        sleep_time = (BACKOFF_BASE ** (attempt - 1)) * (1 + random.uniform(-JITTER, JITTER))
        logging.warning("Post failed (attempt %d): %s; sleeping %.2fs", attempt, result.get("error") or result.get("status_code"), sleep_time)
        time.sleep(sleep_time)
    return {"success": False, "error": "Max retries exceeded"}

def mark_item_as_stored(item_id, storage_record_id):
    logging.info("Item %s marked as stored (storage_id=%s).", item_id, storage_record_id)

def log_failure(item_id, error):
    logging.error("Item %s failed: %s", item_id, error)

def run_pilot(num_items=10, product_code="SKU-12345", batch_number=None, location="WH-A-01", operator_id="operator-1"):
    run_id = uuid.uuid4().hex
    batch_number = batch_number or f"BATCH-{datetime.now(timezone.utc).strftime('%Y%m%d')}-A"
    for i in range(1, num_items + 1):
        item_id = generate_identifier(seq=i)
        date = datetime.now(timezone.utc).date().isoformat()
        label = print_label(item_id, product_code, batch_number, date)
        if not scan_label(label):
            log_failure(item_id, "Label scanning failed")
            # Save scan artifact here
            continue
        timestamp = datetime.now(timezone.utc).isoformat()
        payload = build_payload(item_id, product_code, batch_number, timestamp, location, "Released", run_id, operator_id)
        result = retry_post(payload, idempotency_key=item_id)
        if result.get("success"):
            storage_id = result.get("body", {}).get("storage_record_id", "unknown")
            mark_item_as_stored(item_id, storage_id)
            # Save success artifact here
        else:
            log_failure(item_id, result.get("error") or result.get("status_code"))
            # Save failure artifact here

