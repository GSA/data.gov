import uuid
import random
import logging
import requests
from datetime import datetime, timezone

# Configuration
API_URL = "https://storage.example.com/api/v1/items"
API_TOKEN = "REPLACE_WITH_SECURE_TOKEN"
PRODUCT_CODE = "SKU-12345"
BATCH_NUMBER = "BATCH-20260508-A"
LOCATION = "WH-A-01"
MAX_RETRIES = 5
BASE_BACKOFF = 1.0  # seconds
DRY_RUN = False

# Logger setup
logger = logging.getLogger("pilot_run")
handler = logging.StreamHandler()
formatter = logging.Formatter('%(asctime)s %(levelname)s %(message)s')
handler.setFormatter(formatter)
logger.addHandler(handler)
logger.setLevel(logging.INFO)

def generate_identifier():
    # Use UUID4 for uniqueness; keep human-friendly prefix
    return f"LOT-{uuid.uuid4().hex[:8].upper()}-0001"

def print_label(item_id, product_code, batch_number, date_str):
    label = f"Label: {item_id}, {product_code}, {batch_number}, {date_str}"
    logger.info(f"Printed label for {item_id}")
    return label

def scan_label(label):
    # Replace with real scanner integration; here we simulate with high success rate
    return random.random() > 0.05

def build_payload(item_id, product_code, batch_number, timestamp, location, status):
    return {
        "identifier": item_id,
        "product_code": product_code,
        "batch_number": batch_number,
        "timestamp": timestamp,
        "location": location,
        "status": status,
        "idempotency_key": item_id
    }

def post_to_storage_api(payload):
    if DRY_RUN:
        logger.info("Dry run mode: skipping API call")
        return {"success": True, "status_code": 200, "body": None}
    headers = {
        "Authorization": f"Bearer {API_TOKEN}",
        "Content-Type": "application/json",
        "Idempotency-Key": payload["idempotency_key"]
    }
    try:
        resp = requests.post(API_URL, json=payload, headers=headers, timeout=10)
        success = resp.status_code in (200, 201)
        return {"success": success, "status_code": resp.status_code, "body": resp.text}
    except requests.RequestException as e:
        logger.exception("HTTP request failed")
        return {"success": False, "error": str(e)}

def mark_item_as_stored(item_id):
    logger.info(f"Item {item_id} marked as stored.")

def log_failure(item_id, error):
    logger.error(f"Item {item_id} failed: {error}")

def retry_with_backoff(func, args=(), kwargs=None, max_retries=MAX_RETRIES, base_backoff=BASE_BACKOFF):
    if kwargs is None:
        kwargs = {}
    for attempt in range(1, max_retries + 1):
        result = func(*args, **kwargs)
        if result.get("success"):
            return result
        # Exponential backoff with jitter
        sleep_time = base_backoff * (2 ** (attempt - 1))
        jitter = random.uniform(0, sleep_time * 0.1)
        time.sleep(sleep_time + jitter)
    return result

def run_pilot(num_items=10):
    date_str = datetime.now(timezone.utc).date().isoformat()
    for _ in range(num_items):
        item_id = generate_identifier()
        label = print_label(item_id, PRODUCT_CODE, BATCH_NUMBER, date_str)
        if not scan_label(label):
            log_failure(item_id, "Label scanning failed.")
            continue
        timestamp = datetime.now(timezone.utc).isoformat()
        payload = build_payload(item_id, PRODUCT_CODE, BATCH_NUMBER, timestamp, LOCATION, "Released")
        response = retry_with_backoff(post_to_storage_api, args=(payload,))
        if response.get("success"):
            mark_item_as_stored(item_id)
        else:
            log_failure(item_id, response.get("error") or f"HTTP {response.get('status_code')}")
            # Optionally create a ticket or escalate here

if __name__ == "__main__":
    run_pilot(10)

